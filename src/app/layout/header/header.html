<header>
    <nav>
        @if (isPage()) {
            <a routerLink="['/']" class="nav-logo">NM Chronicles</a>
        } @else {
            <button (click)="scrollTo('main')" class="nav-logo">NM Chronicles</button>
        }

        <button
          class="hamburger"
          type="button"
          aria-label="Toggle menu"
          [attr.aria-expanded]="menuOpen()"
          (click)="toggleMenu()"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <ul class="nav-links">
            @if (isPage()) {
                <a [routerLink]="['/']" class="nav-back" (click)="closeMenu()">← Back to Home</a>
            } @else {
                <li><button type="button" (click)="scrollTo('about')">About</button></li>
                <li><button type="button" (click)="scrollTo('listen')">Listen</button></li>
                <li><button type="button" (click)="scrollTo('characters')">Characters</button></li>
                <li><button type="button" (click)="scrollTo('map')">The City</button></li>
                <li><button type="button" (click)="scrollTo('author')">Author</button></li>
                <li><button type="button" (click)="scrollTo('connect')">Connect</button></li>
            }
        </ul>

        @if (menuOpen()) {
        <div class="mobile-menu">
            <ul>
                @if (isPage()) {
                    <li><a [routerLink]="['/']" (click)="closeMenu()">← Back to Home</a></li>
                } @else {
                    <li><button type="button" (click)="scrollTo('about')">About</button></li>
                    <li><button type="button" (click)="scrollTo('listen')">Listen</button></li>
                    <li><button type="button" (click)="scrollTo('characters')">Characters</button></li>
                    <li><button type="button" (click)="scrollTo('map')">The City</button></li>
                    <li><button type="button" (click)="scrollTo('author')">Author</button></li>
                    <li><button type="button" (click)="scrollTo('connect')">Connect</button></li>
                }
            </ul>
        </div>
        }
    </nav>
</header>
