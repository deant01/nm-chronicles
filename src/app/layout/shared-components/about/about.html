<section id="about" class="fade-up-section" appScrollReveal="is-visible">
  <div class="about">
    <div class="about-text">
      <p class="section-label">{{ content.label }}</p>
      <h2 class="section-title">{{ content.titleLine1 }}<br>{{ content.titleLine2 }}</h2>
      <div class="divider"></div>
      @for (paragraph of content.paragraphs; track content.paragraphs.indexOf(paragraph)) {
        <p>{{ paragraph }}</p>
      }
      <div class="stat-grid">
        @for (stat of content.stats; track content.stats.indexOf(stat)) {
          <div class="stat">
            <div class="stat-num">{{ stat.value }}</div>
            <div class="stat-label">{{ stat.label }}</div>
          </div>
        }
      </div>
    </div>
    <div class="about-img-wrap">
      <img [src]="assetUrl(content.image?.src || '')" [alt]="content.image?.alt || ''" width="4829" height="3269" decoding="async"
        [attr.srcset]="assetUrl(content.image?.src || '') + ' 1x'"
        sizes="(max-width: 900px) 100vw, 387px">
    </div>
  </div>
</section>
