<section id="connect" class="connect-section fade-up-section" appScrollReveal="is-visible">
  <div class="connect-inner">
    <p class="section-label">{{ content.label }}</p>
    <h2 class="section-title">{{ content.title }}</h2>
    <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
    <p class="section-lead">{{ content.lead }}</p>
    <div class="links-grid">
      @for (link of content.links; track content.links.indexOf(link)) {
        <a [href]="link.href" [attr.data-site-link]="link.siteLink" target="_blank" rel="noopener" class="link-card">
          <div class="link-icon">{{ link.icon }}</div>
          <div><div class="link-label">{{ link.label }}</div><div class="link-desc">{{ link.description }}</div></div>
        </a>
      }
    </div>
  </div>
</section>
