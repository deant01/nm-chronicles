<section id="author" class="author-section fade-up-section" appScrollReveal="is-visible">
  <div class="author-grid">
    <div class="about-img-wrap">
      <img class="desktop-image" [src]="authorImageSrc" [alt]="content.imageAlt" width="10781" height="3289">
    </div>
    <div class="author-text">
      <p class="section-label">{{ content.label }}</p>
      <h2 class="section-title">{{ content.title }}</h2>
      <div class="divider"></div>
      <img class="mobile-image" [src]="authorImageSrc" [alt]="content.imageAlt" width="10781" height="3289">
      <p>{{ content.description }}</p>
    </div>
  </div>
</section>
