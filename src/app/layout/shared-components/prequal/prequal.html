<section id="listen" class="listen-section fade-up-section" appScrollReveal="is-visible">
  <div class="listen-inner">
    <p class="section-label">{{ content.label }}</p>
    <h2 class="section-title">{{ content.titleLine1 }}<br>{{ content.titleLine2 }}</h2>
    <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
    <p class="section-lead">{{ content.lead }}</p>
    <div class="yt-embed">
      <iframe data-site-link="youtube-embed" [src]="iframeSrc" [title]="content.iframeTitle" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen loading="lazy"></iframe>
    </div>
    <a [href]="content.linkHref" data-site-link="youtube" target="_blank" rel="noopener" class="yt-link">{{ content.linkText }}</a>
  </div>
</section>
