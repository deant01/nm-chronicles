<div class="section-navigation">
  <button
    type="button"
    class="scroll-toggle"
    (click)="toggleScroll()"
    [attr.aria-label]="buttonLabel()"
    [title]="buttonLabel()"
  >
    <span class="scroll-toggle__text">{{ buttonLabel() }}</span>
    <span class="scroll-toggle__icon" aria-hidden="true">{{ buttonIcon() }}</span>
  </button>
</div>
