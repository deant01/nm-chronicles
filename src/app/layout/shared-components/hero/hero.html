<section class="hero fade-up-section" appScrollReveal="is-visible">
    <img class="hero-bg" lazy="true" [src]="content.heroImage.src" [alt]="content.heroImage.alt">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <p class="hero-eyebrow">{{ content.eyebrow }}</p>
        <h1 class="hero-title">{{ content.titleLine1 }}<br>{{ content.titleLine2 }}</h1>
        <p class="hero-subtitle">{{ content.subtitle }}</p>
        <button class="hero-cta" (click)="scrollTo(content.ctaTarget)">{{ content.ctaLabel }}</button>
    </div>
    <button class="scroll-hint" (click)="scrollTo(content.scrollTarget)">
        <span>{{ content.scrollHint }}</span>
        <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke-width="1.5">
            <path d="M8 2v12M3 11l5 5 5-5" />
        </svg>
    </button>
</section>
