<section id="map" class="map-section fade-up-section" appScrollReveal="is-visible">
  <div class="map-header">
    <p class="section-label">{{ content.label }}</p>
    <h2 class="section-title">{{ content.title }}</h2>
    <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
    <p class="section-lead">{{ content.lead }}</p>
  </div>
  <div class="map-container">
    <a [routerLink]="['/city']" class="map-link" [attr.aria-label]="content.ariaLabel">
      <img [src]="assetUrl('assets/images/map.webp')" [alt]="content.imageAlt" loading="lazy">
      <span class="map-link-hint">{{ content.linkHint }}</span>
    </a>
  </div>
  <p class="map-caption">
    <a [routerLink]="['/city']" class="map-caption-link">{{ content.captionText }}</a>
</p>
</section>
