<div class="lightbox" [class.open]="isOpen()" [attr.aria-hidden]="!isOpen()" role="dialog" aria-modal="true" (click)="close()">
  <button class="lightbox-close" type="button" aria-label="Close" (click)="close($event)">&times;</button>
  @if (isOpen()) {
    <img [src]="src()" [alt]="alt() || 'Image preview'" (click)="$event.stopPropagation()">
  }
  <span class="lightbox-hint">Click outside or &times; to close</span>
</div>
